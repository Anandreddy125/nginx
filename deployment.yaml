apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-rbac
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-rbac
  template:
    metadata:
      labels:
        app: nginx-rbac
    spec:
      securityContext:
        runAsNonRoot: false
        fsGroup: 1500
      containers:
      - name: nginx
        image: anrs125/nginx:v32
        ports:
        - containerPort: 80
        securityContext:
          allowPrivilegeEscalation: true
          capabilities:
            drop: ["ALL"]
            add:
              - NET_BIND_SERVICE
              - CHOWN
              - SETUID
              - SETGID
              - DAC_OVERRIDE
              - FOWNER
        volumeMounts:
        - name: sensitive-files
          mountPath: /etc/nginx/sensitive
        # ✅ PVC mounted here — shadow file persists across restarts
        - name: shadow-pvc
          mountPath: /data
      volumes:
      - name: sensitive-files
        secret:
          secretName: nginx-sensitive-secret
          defaultMode: 0600
      - name: shadow-pvc
        persistentVolumeClaim:
          claimName: nginx-shadow-pvc
